# ShadowOS Terminal Color Scheme — Cyberpunk Neon
# For use with Kitty, Alacritty, and compatible terminals

# ─── Core Colors ────────────────────────────────────────────────────────
background #0a0a0f
foreground #f0f0ff
selection_foreground #0a0a0f
selection_background #00ffff

# ─── ANSI Colors ────────────────────────────────────────────────────────
color0  #1a1a2e  # Black (dark navy)
color1  #ff0055  # Red (neon red)
color2  #00ff88  # Green (neon green)
color3  #ffbf00  # Yellow (amber)
color4  #00ffff  # Blue (neon cyan)
color5  #ff00ff  # Magenta (neon magenta)
color6  #00d4ff  # Cyan (sky blue)
color7  #c0c0c0  # White (light gray)

# ─── Bright Colors ──────────────────────────────────────────────────────
color8  #555577  # Bright Black
color9  #ff3377  # Bright Red
color10 #00ffaa  # Bright Green
color11 #ffcc00  # Bright Yellow
color12 #55ffff  # Bright Blue
color13 #ff55ff  # Bright Magenta
color14 #88ffff  # Bright Cyan
color15 #ffffff  # Bright White

# ─── Accent Colors ──────────────────────────────────────────────────────
accent_color #00ffff
tab_bar_background #0a0a0f
tab_bar_margin_height 0
active_tab_foreground #0a0a0f
active_tab_background #00ffff
inactive_tab_foreground #666666
inactive_tab_background #1a1a2e

# ─── Cursor ─────────────────────────────────────────────────────────────
cursor #00ffff
cursor_text_color #0a0a0f
cursor_beam_thickness 2.0
cursor_underline_thickness 0.5
cursor_blink_interval -1

# ─── URL ────────────────────────────────────────────────────────────────
url_color #00ffff
url_style underline

# ─── Bell ────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0
command_on_bell none

# ─── Scrolling ──────────────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager less --RAW-CONTROL-CHARS +INPUT_LINE
wheel_scroll_multiplier 3

# ─── Font ────────────────────────────────────────────────────────────────
font_family JetBrains Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 13
letter_spacing 0.5
line_height 1.2

# ─── Window ─────────────────────────────────────────────────────────────
window_padding_width 8
window_margin_width 0
window_border_width 2
initial_window_width 1200
initial_window_height 700
opacity 0.95

# ─── Tab Bar ────────────────────────────────────────────────────────────
tab_bar_style powerline
tab_bar_min_tabs 2

# ─── Performance ────────────────────────────────────────────────────────
repaint_delay 0
input_delay 0
sync_to_monitor 1

# ─── Shell ───────────────────────────────────────────────────────────────
shell /usr/bin/zsh

# ─── Detect URLs ────────────────────────────────────────────────────────
detect_urls yes
url_prefixes https://,http://,file://,git://,ssh://,ftp://
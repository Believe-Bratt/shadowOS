# ============================================================================
# ShadowOS Kitty Terminal Configuration — Cyberpunk Theme
# ============================================================================

# ─── Font ────────────────────────────────────────────────────────────────────
font_family JetBrains Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 13.0
letter_spacing 0.5
line_height 1.2

# ─── Colors ─────────────────────────────────────────────────────────────────
# Background & foreground
background #0a0a0f
foreground #f0f0ff
selection_background #00ffff
selection_foreground #0a0a0f

# Cursor
cursor #00ffff
cursor_text_color #0a0a0f
cursor_beam_thickness 2.0
cursor_underline_thickness 0.5
cursor_blink_interval -1

# URL color
url_color #00ffff
url_style underline

# ─── ANSI Colors ─────────────────────────────────────────────────────────────
# Normal
color0  #1a1a2e   # Black (dark navy)
color1  #ff0055   # Red (neon red)
color2  #00ff88   # Green (neon green)
color3  #ffbf00   # Yellow (amber)
color4  #00ffff   # Blue (neon cyan)
color5  #c54dff   # Magenta (neon magenta)
color6  #00d4ff   # Cyan (sky blue)
color7  #c0c0c0   # White (light gray)

# Bright
color8  #555577   # Bright Black
color9  #ff3377   # Bright Red
color10 #00ffaa   # Bright Green
color11 #ffcc00   # Bright Yellow
color12 #55ffff   # Bright Blue
color13 #d47dff   # Bright Magenta
color14 #88ffff   # Bright Cyan
color15 #ffffff   # Bright White

# ─── Window ─────────────────────────────────────────────────────────────────
background_opacity 0.95
background_blur 4
dim_opacity 0.75
active_border_color #00ffff
inactive_border_color #333344
bell_border_color #ffbf00
visual_bell_color #ff00ff
visual_bell_duration 0

# ─── Tab Bar ─────────────────────────────────────────────────────────────────
tab_bar_style powerline
tab_bar_min_tabs 2
tab_bar_edge bottom
tab_bar_margin_width 0
tab_bar_margin_height 0
tab_bar_align left
tab_title_template {title}
active_tab_foreground #0a0a0f
active_tab_background #00ffff
inactive_tab_foreground #666666
inactive_tab_background #1a1a2e

# ─── Borders ─────────────────────────────────────────────────────────────────
window_border_width 2
window_margin_width 0
window_padding_width 8
draw_minimal_borders yes
placement_strategy center
active_border_color #00ffff
inactive_border_color #333344
bell_border_color #ffbf00

# ─── Scrollback ──────────────────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager less --RAW-CONTROL-CHARS +INPUT_LINE
wheel_scroll_multiplier 3

# ─── Mouse ───────────────────────────────────────────────────────────────────
mouse_hide_wait 3.0
url_regexes file://https?://

# ─── Performance ─────────────────────────────────────────────────────────────
repaint_delay 0
input_delay 0
sync_to_monitor 1

# ─── Bell ─────────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0
command_on_bell none

# ─── Shell ────────────────────────────────────────────────────────────────────
shell /usr/bin/zsh

# ─── Startup ─────────────────────────────────────────────────────────────────
startup_session none
remember_window_size yes
initial_window_width 1200
initial_window_height 700

# ─── Layout ──────────────────────────────────────────────────────────────────
enabled_layouts *
resize_decrease_watermark 0.5
resize_increase_watermark 0.5

# ─── Text Rendering ──────────────────────────────────────────────────────────
# No sub-pixel antialiasing for crisp neon look
antialiasing none
subpixel_resolution unknown
subpixel_geometry unknown

# ─── Advanced ────────────────────────────────────────────────────────────────
# GPU rendering
render_style opengl
# Allow remote control
allow_remote_control yes
# Clipboard
copy_on_select no
# Mouse cursor
pointer_shape_when_grabbed pointer

# ─── Key Bindings ────────────────────────────────────────────────────────────
# Map Ctrl+Shift+Enter to new window
map ctrl+shift+enter new_window
# Map Ctrl+Shift+N to new window
map ctrl+shift+n new_window
# Map Ctrl+Shift+W to close window
map ctrl+shift+w close_window
# Map Ctrl+Shift+> to next tab
map ctrl+shift+greater next_tab
# Map Ctrl+Shift+< to previous tab
map ctrl+shift+less previous_tab
# Map Ctrl+Shift+Z to toggle fullscreen
map ctrl+shift+z toggle_fullscreen

# ─── Detect URLs ─────────────────────────────────────────────────────────────
detect_urls yes
url_prefixes https://,http://,file://,git://,ssh://,ftp://

# ─── End of Kitty Config ───────────────────────────────────────────────────── 


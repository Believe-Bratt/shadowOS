# ============================================================================
# ShadowOS Picom (Compositor) Configuration — Cyberpunk Effects
# ============================================================================
# Advanced compositing with blur, shadows, animations, and wobbly effects
# ============================================================================

# ─── Backend ──────────────────────────────────────────────────────────────────
backend = "glx";
vsync = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;
log-level = "warn";

# ─── Shadows ─────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 15;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.4;
shadow-color = "#000000";
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g ?= 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ─── Blur ─────────────────────────────────────────────────────────────────────
blur-method = "dual_kawase";
blur-strength = 8;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'slop'"
];

# ─── Opacity ──────────────────────────────────────────────────────────────────
opacity-rule = [
    "95:class_g = 'Alacritty'",
    "95:class_g = 'kitty'",
    "90:class_g = 'Rofi'",
    "90:class_g = 'dunst'",
    "100:class_g = 'firefox'",
    "85:class_g = 'discord'",
    "85:class_g = 'telegram'",
    "85:class_g = 'signal'"
];

# ─── Fading ───────────────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;
fade-exclude = [0];

# ─── Corner Rounding ──────────────────────────────────────────────────────────
rounded-corners = 10;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "override_redirect = 1"
];

# ─── Animations ───────────────────────────────────────────────────────────────
animations = true;
animation-window-multiplier = 1.0;
animation-stiffness = 1000.0;
animation-damping = 0.9;
animation-clamping = true;
animation-duration = 300;
animation-window-open = 1;
animation-window-close = 1;
animation-window-minimize = 1;
animation-window-maximize = 1;
animation-window-restore = 1;

# ─── Wobbly Windows (Experimental) ───────────────────────────────────────────
wobbly-windows = true;
wobbly-windows-multiplier = 0.5;
wobbly-windows-stiffness = 200.0;
wobbly-windows-damping = 0.9;
wobbly-windows-clamping = true;

# ─── Window-specific Settings ─────────────────────────────────────────────────
wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.9; };
  popup_menu = { opacity = 0.9; };
  dropdown_menu = { opacity = 0.9; };
};

# ─── VSync ────────────────────────────────────────────────────────────────────
# Use GLX vsync for smooth animations
glx-swap-method = "buffer-age";

# ─── Performance ──────────────────────────────────────────────────────────────
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 60;

# ─── End of Picom Config ─────────────────────────────────────────────────────── 

# ============================================================================
# ShadowOS Swaylock Configuration — Cyberpunk Lock Screen
# ============================================================================
# Place in ~/.config/swaylock/config or /etc/swaylock/config
# ============================================================================

# ─── Appearance ───────────────────────────────────────────────────────────────
image = /usr/share/backgrounds/shadowos/cyberpunk-city.png
scale = fill

# Color scheme (cyberpunk neon)
color = 0a0a0fff      # Background (dark)
indicator = 00ffff    # Cursor/input indicator (neon cyan)
indicator-radius = 100
indicator-thickness = 8

# Text
text-color = f0f0ffff
font = JetBrains Mono 12

# ─── Effects ─────────────────────────────────────────────────────────────────
# Blur background
effect-blur = 10x10
effect-vignette = 0.5:0.5

# Ring animation
ring-color = 00ffff
ring-wrong-color = ff0055
ring-verification-color = 00ff88

# Line animation
line-color = 00ffff
line-wrong-color = ff0055
line-verification-color = 00ff88

# ─── Layout ──────────────────────────────────────────────────────────────────
# Show clock
show-failed-attempts = true
disable-caps-lock-text = false
caps-lock-key-color = ffbf00
caps-lock-bg-color = 1a1a2e

# ─── PAM ─────────────────────────────────────────────────────────────────────
ignore-empty-password = true

# ─── Key Hints ───────────────────────────────────────────────────────────────
show-key-hint = true
key-hint-color = 666677
key-hint-border-color = 333344
key-hint-caps-lock-color = ffbf00
key-hint-caps-lock-border-color = ffbf00

# ─── Debug ───────────────────────────────────────────────────────────────────
debug = false  

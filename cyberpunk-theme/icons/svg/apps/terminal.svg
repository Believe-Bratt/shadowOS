<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- ShadowOS Terminal Icon — Cyberpunk Neon -->
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="48" height="48" rx="6" fill="#0a0a0f"/>
  <!-- Screen -->
  <rect x="6" y="8" width="36" height="28" rx="3" fill="#1a1a2e" stroke="url(#neonGlow)" stroke-width="2" filter="url(#glow)"/>
  <!-- Prompt symbol -->
  <text x="12" y="26" font-family="monospace" font-size="14" fill="#00ffff" filter="url(#glow)">_</text>
  <!-- Cursor -->
  <rect x="16" y="20" width="2" height="14" fill="#ff00ff" filter="url(#glow)"/>
  <!-- Neon accent lines -->
  <line x1="6" y1="44" x2="42" y2="44" stroke="#00ffff" stroke-width="2" filter="url(#glow)"/>
</svg> 

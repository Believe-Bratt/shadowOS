# ============================================================================
# ShadowOS Tmux Configuration
# Cyberpunk-themed status bar with AI integration
# ============================================================================

# ─── General Settings ────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g bell-action any
set -g default-shell /usr/bin/zsh

# ─── Status Bar ─────────────────────────────────────────────────────────
set -g status-style "bg=#0a0a0f,fg=#00ffff"
set -g status-left-length 100
set -g status-right-length 150
set -g status-interval 2

set -g status-left "#[bg=#00ffff,fg=#0a0a0f,bold] SHADOWOS #[bg=#0a0a0f,fg=#00ffff]│ #[fg=#ff00ff]#S #[fg=#00ffff]│"

set -g status-right "#[fg=#00ffff]#[bg=#1a1a2e] #{cpu_percentage} #[bg=#0a0a0f]#[fg=#ffbf00]#{ram_percentage} #[bg=#0a0a0f]#[fg=#00ffff] %H:%M:%S #[bg=#00ffff,fg=#0a0a0f,bold] %d/%m/%Y "

# ─── Window Status ──────────────────────────────────────────────────────
set -g window-status-format "#[fg=#666666] #I:#W "
set -g window-status-current-format "#[bg=#00ffff,fg=#0a0a0f,bold] #I:#W "
set -g window-status-separator ""

# ─── Panes ──────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#00ffff"
set -g pane-border-status top
set -g pane-border-format "#{pane_index} #{pane_current_command}"

# ─── Key Bindings ───────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Quick pane navigation
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes
bind -r M-H resize-pane -L 5
bind -r M-L resize-pane -R 5
bind -r M-K resize-pane -U 5
bind -r M-J resize-pane -D 5

# Toggle pane zoom
bind z resize-pane -Z

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ─── Copy Mode ──────────────────────────────────────────────────────────
set -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ─── AI Integration ─────────────────────────────────────────────────────
# Prefix + A: AI query from selected text
bind A run-shell "tmux capture-pane -p -S - | head -50 | xargs -I {} echo '{}' | ai 2>/dev/null || true"

# ─── Plugins ────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'